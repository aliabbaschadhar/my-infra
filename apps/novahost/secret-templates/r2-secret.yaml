apiVersion: v1
kind: Secret
metadata:
  name: novahost-r2-secret
  namespace: novahost
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: "REPLACE_WITH_R2_ACCESS_KEY_ID"
  S3_SECRET_ACCESS_KEY: "REPLACE_WITH_R2_SECRET_ACCESS_KEY"
  S3_ENDPOINT: "REPLACE_WITH_R2_ENDPOINT"
  S3_BUCKET: "REPLACE_WITH_R2_BUCKET_NAME"
  S3_REGION: "auto"
  BASE_PATH: "REPLACE_WITH_R2_BASE_PATH"